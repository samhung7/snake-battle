<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>貪食蛇對戰</title>

  <!-- Favicon — SVG (snake emoji, modern browsers) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐍</text></svg>">

  <!-- iOS / iPadOS home-screen icon -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- PWA: standalone app behaviour -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snake">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1A5472">

  <!-- PWA manifest (Android Chrome "Add to Home Screen") -->
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="css/style.css">
</head>
<body class="light">

<!-- ═══════════════════════════════════════
     MENU
════════════════════════════════════════ -->
<div id="menu">

  <div id="menu-topbar">
    <!-- Language selector — left -->
    <select id="lang-select" onchange="setLang(this.value)" title="Language">
      <option value="zh-TW" selected>繁中</option>
      <option value="zh-CN">简中</option>
      <option value="en">EN</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
    </select>

    <h1 data-i18n="title">貪食蛇對戰</h1>

    <!-- Theme toggle — right -->
    <button class="icon-btn" onclick="toggleTheme()" title="切換主題">
      <span class="theme-icon">🌙</span>
    </button>
  </div>

  <div class="mode-buttons">
    <button class="btn btn-1" id="btn-pvp" onclick="setMode('pvp')" data-i18n="btnPvp">1P vs 2P</button>
    <button class="btn btn-2" id="btn-pvc" onclick="setMode('pvc')" data-i18n="btnPvc">1P vs 電腦</button>
    <button class="btn btn-3" id="btn-cvc" onclick="setMode('cvc')" data-i18n="btnCvc">電腦 vs 電腦</button>
  </div>

  <div class="speed-select">
    <label id="speed-label" data-i18n="speedLabel">速度：</label>
    <select id="speed-select">
      <option value="150" data-i18n="speedSlow">慢速</option>
      <option value="100" selected data-i18n="speedNormal">正常</option>
      <option value="65"  data-i18n="speedFast">快速</option>
      <option value="40"  data-i18n="speedCrazy">瘋狂</option>
    </select>
  </div>

  <!-- Wall-wrap mode toggle -->
  <div class="menu-option-row">
    <span class="menu-option-label" data-i18n="wallWrapLabel">穿牆模式</span>
    <button class="btn btn-2 active" id="wall-wrap-btn" onclick="toggleWallWrap()" data-i18n="wallWrapOn">開啟 ✓</button>
  </div>

  <!-- Food count selector -->
  <div class="menu-option-row">
    <span class="menu-option-label" data-i18n="foodLabel">食物數量</span>
    <div class="counter">
      <button class="counter-btn" id="food-minus" onclick="adjustFood(-1)" disabled>−</button>
      <span   class="counter-val" id="food-count-display">3</span>
      <button class="counter-btn" id="food-plus"  onclick="adjustFood(1)">＋</button>
    </div>
  </div>

  <button class="btn btn-1" id="start-btn" onclick="startGame()" data-i18n="startBtn">開始遊戲</button>

  <div class="controls-hint" id="controls-hint"></div>

</div>

<!-- ═══════════════════════════════════════
     GAME
════════════════════════════════════════ -->
<div id="game-container">

  <!-- Top bar: scores + controls -->
  <div id="game-topbar">
    <div id="scoreboard">
      <span class="score-p1" id="p1-label">P1: <span id="score1">0</span></span>
      <span class="score-p2" id="p2-label">P2: <span id="score2">0</span></span>
    </div>
    <div id="game-actions">
      <button class="icon-btn" onclick="toggleTheme()" title="切換主題">
        <span class="theme-icon">🌙</span>
      </button>
      <button class="icon-btn" id="pause-btn" onclick="togglePause()" title="暫停">⏸</button>
      <button class="icon-btn" id="back-btn"  onclick="backToMenu()"  title="回主選單">⌂</button>
    </div>
  </div>

  <!-- ── Top touchpad: P1 (pvp mode only) ── -->
  <div id="dpad-top" class="dpad-zone hidden">
    <div class="touchpad-wrap">
      <div class="dpad-label c-p1">P1</div>
      <div class="touchpad" id="touchpad1"></div>
    </div>
  </div>

  <!-- ── Canvas ── -->
  <canvas id="canvas"></canvas>
  <div id="status"></div>

  <!-- ── Bottom touchpad: P2 (pvp only) ── -->
  <div id="dpad-bottom" class="dpad-zone hidden">
    <div class="touchpad-wrap">
      <div class="dpad-label c-p2" id="dpad-bottom-label">P2</div>
      <div class="touchpad p2" id="touchpad2"></div>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════
     OVERLAY (results / pause)
════════════════════════════════════════ -->
<div id="overlay">
  <h2 id="overlay-title"></h2>
  <p  id="overlay-msg"></p>
  <button class="btn btn-1" id="restart-btn" onclick="restartGame()" data-i18n="restartBtn">再玩一局</button>
  <button class="btn btn-2" id="menu-btn"    onclick="backToMenu()"  data-i18n="menuBtn">主選單</button>
</div>

<script src="js/game.js"></script>
</body>
</html>
