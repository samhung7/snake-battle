<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>雙人貪食蛇</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══════════════════════════════════════
     MENU
════════════════════════════════════════ -->
<div id="menu">

  <div id="menu-topbar">
    <h1>貪食蛇對戰</h1>
    <button class="icon-btn" onclick="toggleTheme()" title="切換主題">
      <span class="theme-icon">☀</span>
    </button>
  </div>

  <div class="mode-buttons">
    <button class="btn btn-1 active" id="btn-pvp" onclick="setMode('pvp')">1P vs 2P</button>
    <button class="btn btn-2"        id="btn-pvc" onclick="setMode('pvc')">1P vs 電腦</button>
    <button class="btn btn-3"        id="btn-cvc" onclick="setMode('cvc')">電腦 vs 電腦</button>
  </div>

  <div class="speed-select">
    <label>速度：</label>
    <select id="speed-select">
      <option value="150">慢速</option>
      <option value="100" selected>正常</option>
      <option value="65">快速</option>
      <option value="40">瘋狂</option>
    </select>
  </div>

  <button class="btn btn-1" onclick="startGame()">開始遊戲</button>

  <div class="controls-hint" id="controls-hint">
    <span class="c-p1">● 玩家1：WASD 移動</span><br>
    <span class="c-p2">● 玩家2：方向鍵 移動</span><br><br>
    撞牆、撞自己或對方蛇身 → 扣分並重生<br>
    搶先吃到食物 → 得分
  </div>

</div>

<!-- ═══════════════════════════════════════
     GAME
════════════════════════════════════════ -->
<div id="game-container">

  <!-- Top bar: scores + controls -->
  <div id="game-topbar">
    <div id="scoreboard">
      <span class="score-p1" id="p1-label">P1: <span id="score1">0</span></span>
      <span class="score-p2" id="p2-label">P2: <span id="score2">0</span></span>
    </div>
    <div id="game-actions">
      <button class="icon-btn" onclick="toggleTheme()" title="切換主題">
        <span class="theme-icon">☀</span>
      </button>
      <button class="icon-btn" id="pause-btn" onclick="togglePause()" title="暫停">⏸</button>
      <button class="icon-btn" id="back-btn"  onclick="backToMenu()" title="回主選單">⌂</button>
    </div>
  </div>

  <!-- ── Top D-pad: P1 (pvp mode only) ── -->
  <div id="dpad-top" class="dpad-zone hidden">
    <div class="dpad-wrap">
      <div class="dpad-label c-p1">P1</div>
      <div class="dpad">
        <button class="dpad-btn d-up"    data-player="1" data-dir="UP">▲</button>
        <button class="dpad-btn d-left"  data-player="1" data-dir="LEFT">◀</button>
        <div    class="dpad-mid"></div>
        <button class="dpad-btn d-right" data-player="1" data-dir="RIGHT">▶</button>
        <button class="dpad-btn d-down"  data-player="1" data-dir="DOWN">▼</button>
      </div>
    </div>
  </div>

  <!-- ── Canvas ── -->
  <canvas id="canvas"></canvas>
  <div id="status">按 ESC 返回主選單 | 按 P 暫停</div>

  <!-- ── Bottom D-pad: P2 (pvp) / P1 (pvc) ── -->
  <div id="dpad-bottom" class="dpad-zone hidden">
    <div class="dpad-wrap">
      <div class="dpad-label c-p2" id="dpad-bottom-label">P2</div>
      <div class="dpad">
        <button class="dpad-btn d-up"    data-player="2" data-dir="UP">▲</button>
        <button class="dpad-btn d-left"  data-player="2" data-dir="LEFT">◀</button>
        <div    class="dpad-mid p2"      id="dpad-bottom-mid"></div>
        <button class="dpad-btn d-right" data-player="2" data-dir="RIGHT">▶</button>
        <button class="dpad-btn d-down"  data-player="2" data-dir="DOWN">▼</button>
      </div>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════
     OVERLAY (results / pause)
════════════════════════════════════════ -->
<div id="overlay">
  <h2 id="overlay-title"></h2>
  <p  id="overlay-msg"></p>
  <button class="btn btn-1" onclick="restartGame()">再玩一局</button>
  <button class="btn btn-2" onclick="backToMenu()">主選單</button>
</div>

<script src="js/game.js"></script>
</body>
</html>
