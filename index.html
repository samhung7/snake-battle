<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>雙人貪食蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #0c1820;
      color: #F3E3D0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.1rem, 5vw, 2rem);
      letter-spacing: 4px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #AACDDC, #F3E3D0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    /* ─── Menu ─── */
    #menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px;
      max-height: 100dvh;
      overflow-y: auto;
    }

    .mode-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 520px;
    }

    .btn {
      padding: 10px 20px;
      border: 2px solid;
      background: transparent;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.72rem, 3vw, 0.95rem);
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      touch-action: manipulation;
    }

    .btn-green  { border-color: #AACDDC; color: #AACDDC; }
    .btn-green:hover, .btn-green.active  { background: #AACDDC; color: #0c1820; }

    .btn-blue   { border-color: #81A6C6; color: #81A6C6; }
    .btn-blue:hover,  .btn-blue.active   { background: #81A6C6; color: #0c1820; }

    .btn-orange { border-color: #D2C4B4; color: #D2C4B4; }
    .btn-orange:hover,.btn-orange.active { background: #D2C4B4; color: #0c1820; }

    .controls-hint {
      font-size: clamp(0.62rem, 2.4vw, 0.75rem);
      color: #81A6C6;
      text-align: center;
      line-height: 1.9;
    }

    .speed-select {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: clamp(0.72rem, 2.8vw, 0.85rem);
      color: #81A6C6;
    }

    .speed-select label { letter-spacing: 1px; }

    select {
      background: #152230;
      color: #F3E3D0;
      border: 1px solid #81A6C6;
      padding: 4px 8px;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.72rem, 2.8vw, 0.85rem);
      touch-action: manipulation;
    }

    /* ─── Game ─── */
    #game-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
    }

    #scoreboard {
      display: flex;
      gap: 32px;
      font-size: clamp(0.78rem, 3.5vw, 1rem);
      letter-spacing: 2px;
    }

    .score-p1 { color: #AACDDC; }
    .score-p2 { color: #D2C4B4; }

    #canvas {
      border: 2px solid #81A6C6;
      display: block;
      touch-action: none;
      box-shadow: 0 0 28px rgba(129,166,198,0.15);
    }

    #status {
      font-size: clamp(0.6rem, 2.2vw, 0.8rem);
      color: #81A6C6;
      letter-spacing: 1px;
      text-align: center;
    }

    /* ─── Overlay ─── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(12,24,32,0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      padding: 16px;
    }

    #overlay.visible { display: flex; }

    #overlay h2 {
      font-size: clamp(1.2rem, 5vw, 2rem);
      letter-spacing: 4px;
      color: #F3E3D0;
      text-align: center;
    }

    #overlay p {
      color: #81A6C6;
      letter-spacing: 2px;
      font-size: clamp(0.72rem, 3vw, 0.95rem);
      text-align: center;
    }

    /* ─── Mobile D-pad ─── */
    #dpad-area {
      display: none;   /* overridden by pointer:coarse */
      align-items: center;
      justify-content: space-around;
      width: 100%;
      padding: 4px 12px 6px;
    }

    .dpad-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .dpad-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
    }

    /* 3×3 grid; only 4 directional cells + centre used */
    .dpad {
      display: grid;
      grid-template-areas:
        ". up ."
        "left mid right"
        ". down .";
      grid-template-columns: repeat(3, var(--dpad-btn));
      grid-template-rows:    repeat(3, var(--dpad-btn));
      gap: 4px;
      --dpad-btn: 50px;
    }

    .dpad-btn {
      width:  var(--dpad-btn);
      height: var(--dpad-btn);
      background: rgba(129,166,198,0.10);
      border: 1.5px solid rgba(129,166,198,0.45);
      color: #AACDDC;
      font-size: 1.05rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      cursor: pointer;
      transition: background 0.07s;
    }

    .dpad-btn.pressed, .dpad-btn:active {
      background: rgba(170,205,220,0.30);
    }

    .dpad-btn.p2 {
      border-color: rgba(210,196,180,0.45);
      color: #D2C4B4;
    }
    .dpad-btn.p2.pressed, .dpad-btn.p2:active {
      background: rgba(210,196,180,0.30);
    }

    .dpad-up    { grid-area: up;    }
    .dpad-down  { grid-area: down;  }
    .dpad-left  { grid-area: left;  }
    .dpad-right { grid-area: right; }

    .dpad-mid {
      grid-area: mid;
      width:  var(--dpad-btn);
      height: var(--dpad-btn);
      border: 1.5px solid rgba(129,166,198,0.18);
      border-radius: 50%;
    }

    #mobile-pause-btn {
      width: 52px;
      height: 52px;
      padding: 0;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    /* ─── Responsive: show D-pad on touch devices ─── */
    @media (pointer: coarse) {
      #dpad-area { display: flex; }
      #status    { display: none; }
    }

    /* Extra-small phones */
    @media (max-width: 360px) {
      .dpad { --dpad-btn: 42px; }
      .btn  { padding: 8px 12px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ MENU ═══════════════ -->
<div id="menu">
  <h1>貪食蛇對戰</h1>

  <div class="mode-buttons">
    <button class="btn btn-green active" id="btn-pvp" onclick="setMode('pvp')">1P vs 2P</button>
    <button class="btn btn-blue"         id="btn-pvc" onclick="setMode('pvc')">1P vs 電腦</button>
    <button class="btn btn-orange"       id="btn-cvc" onclick="setMode('cvc')">電腦 vs 電腦</button>
  </div>

  <div class="speed-select">
    <label>速度：</label>
    <select id="speed-select">
      <option value="150">慢速</option>
      <option value="100" selected>正常</option>
      <option value="65">快速</option>
      <option value="40">瘋狂</option>
    </select>
  </div>

  <button class="btn btn-green" onclick="startGame()">開始遊戲</button>

  <div class="controls-hint" id="controls-hint">
    <span style="color:#AACDDC">● 玩家1：WASD 移動</span><br>
    <span style="color:#D2C4B4">● 玩家2：方向鍵 移動</span><br><br>
    撞牆、撞自己或撞對方蛇身 → 扣分並重生<br>
    搶先吃到食物 → 得分
  </div>
</div>

<!-- ═══════════════ GAME ═══════════════ -->
<div id="game-container">
  <div id="scoreboard">
    <span class="score-p1" id="p1-label">P1: <span id="score1">0</span></span>
    <span class="score-p2" id="p2-label">P2: <span id="score2">0</span></span>
  </div>

  <canvas id="canvas"></canvas>

  <div id="status">按 ESC 返回主選單 | 按 P 暫停</div>

  <!-- Mobile D-pad (visible only on touch devices via CSS) -->
  <div id="dpad-area">

    <!-- P1 left pad -->
    <div class="dpad-wrap" id="dpad1-wrap">
      <div class="dpad-label" style="color:#AACDDC">P1</div>
      <div class="dpad">
        <button class="dpad-btn dpad-up"    data-player="1" data-dir="UP">▲</button>
        <button class="dpad-btn dpad-left"  data-player="1" data-dir="LEFT">◀</button>
        <div    class="dpad-mid"></div>
        <button class="dpad-btn dpad-right" data-player="1" data-dir="RIGHT">▶</button>
        <button class="dpad-btn dpad-down"  data-player="1" data-dir="DOWN">▼</button>
      </div>
    </div>

    <!-- Centre pause -->
    <button class="btn btn-blue" id="mobile-pause-btn">⏸</button>

    <!-- P2 right pad -->
    <div class="dpad-wrap" id="dpad2-wrap">
      <div class="dpad-label" style="color:#D2C4B4" id="dpad2-label">P2</div>
      <div class="dpad">
        <button class="dpad-btn p2 dpad-up"    data-player="2" data-dir="UP">▲</button>
        <button class="dpad-btn p2 dpad-left"  data-player="2" data-dir="LEFT">◀</button>
        <div    class="dpad-mid" style="border-color:rgba(210,196,180,0.18)"></div>
        <button class="dpad-btn p2 dpad-right" data-player="2" data-dir="RIGHT">▶</button>
        <button class="dpad-btn p2 dpad-down"  data-player="2" data-dir="DOWN">▼</button>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════ OVERLAY ═══════════════ -->
<div id="overlay">
  <h2 id="overlay-title"></h2>
  <p  id="overlay-msg"></p>
  <button class="btn btn-green" onclick="restartGame()">再玩一局</button>
  <button class="btn btn-blue"  onclick="backToMenu()">主選單</button>
</div>

<script>
// ─────────────────────────────────────────────
// Grid constants (CELL is dynamic)
// ─────────────────────────────────────────────
const COLS = 30;
const ROWS = 25;
let CELL = 20;
let W = COLS * CELL;
let H = ROWS * CELL;

const DIR      = { UP:[0,-1], DOWN:[0,1], LEFT:[-1,0], RIGHT:[1,0] };
const OPPOSITE = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };

const COLORS = {
  p1Head:'#AACDDC', p1Body:'#81A6C6', p1Dead:'#2a404e',
  p2Head:'#F3E3D0', p2Body:'#D2C4B4', p2Dead:'#3d3228',
  food:'#F3E3D0',   bg:'#0c1820',     grid:'#111e28',
};

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let mode        = 'pvp';
let gameLoop    = null;
let paused      = false;
let gameOver    = false;
let tickInterval= 100;
let snake1, snake2, foods, score1, score2;

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ─────────────────────────────────────────────
// Responsive sizing
// ─────────────────────────────────────────────
function isTouchDevice() {
  return window.matchMedia('(pointer: coarse)').matches;
}

function computeCell() {
  const touch  = isTouchDevice();
  const dpadH  = touch ? (mode === 'cvc' ? 80 : 174) : 0;
  const scoreH = 42;
  const statH  = touch ? 0 : 26;
  const padH   = touch ? 14 : 20;
  const padW   = touch ? 8  : 20;

  const availW = window.innerWidth  - padW;
  const availH = window.innerHeight - scoreH - statH - dpadH - padH;

  CELL = Math.max(8, Math.floor(Math.min(availW / COLS, availH / ROWS)));
  W    = COLS * CELL;
  H    = ROWS * CELL;
  canvas.width  = W;
  canvas.height = H;
}

window.addEventListener('resize', () => {
  computeCell();
  if (snake1) draw();
});

// ─────────────────────────────────────────────
// Menu
// ─────────────────────────────────────────────
function setMode(m) {
  mode = m;
  ['pvp','pvc','cvc'].forEach(id =>
    document.getElementById('btn-'+id).classList.toggle('active', m === id));

  const touch = isTouchDevice();
  const hint  = document.getElementById('controls-hint');

  if (m === 'pvp') {
    hint.innerHTML = touch
      ? `<span style="color:#AACDDC">● 玩家1：左側搖桿</span><br>
         <span style="color:#D2C4B4">● 玩家2：右側搖桿</span><br><br>
         撞牆或對方 → 扣分並重生　搶食物 → 得分`
      : `<span style="color:#AACDDC">● 玩家1：WASD 移動</span><br>
         <span style="color:#D2C4B4">● 玩家2：方向鍵 移動</span><br><br>
         撞牆、撞自己或對方蛇身 → 扣分並重生<br>搶先吃到食物 → 得分`;
  } else if (m === 'pvc') {
    hint.innerHTML = touch
      ? `<span style="color:#AACDDC">● 玩家1：左側搖桿 / 在畫面上滑動</span><br>
         <span style="color:#D2C4B4">● 電腦：自動追蹤食物</span><br><br>
         撞牆或對方 → 扣分並重生　搶食物 → 得分`
      : `<span style="color:#AACDDC">● 玩家1：WASD 移動</span><br>
         <span style="color:#D2C4B4">● 電腦：自動追蹤食物</span><br><br>
         撞牆、撞自己或對方蛇身 → 扣分並重生<br>搶先吃到食物 → 得分`;
  } else {
    hint.innerHTML =
      `<span style="color:#AACDDC">● CPU1：自動追蹤食物</span><br>
       <span style="color:#D2C4B4">● CPU2：自動追蹤食物</span><br><br>
       <span style="color:#F3E3D0">🤖 純觀戰模式，完全不需動手！</span><br>
       撞牆、撞自己或對方蛇身 → 扣分並重生`;
  }
}

function startGame() {
  tickInterval = parseInt(document.getElementById('speed-select').value);
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game-container').style.display = 'flex';

  // Scoreboard labels
  if (mode === 'cvc') {
    document.getElementById('p1-label').innerHTML = 'CPU1: <span id="score1">0</span>';
    document.getElementById('p2-label').innerHTML = 'CPU2: <span id="score2">0</span>';
    document.getElementById('status').textContent  = '觀戰模式 ★ 按 P 暫停';
  } else {
    document.getElementById('p1-label').innerHTML = 'P1: <span id="score1">0</span>';
    document.getElementById('p2-label').innerHTML =
      (mode === 'pvc' ? 'CPU' : 'P2') + ': <span id="score2">0</span>';
    document.getElementById('status').textContent  = '按 ESC 返回 | 按 P 暫停';
  }

  // D-pad layout per mode
  const d2wrap  = document.getElementById('dpad2-wrap');
  const d2label = document.getElementById('dpad2-label');
  if (mode === 'cvc') {
    document.getElementById('dpad1-wrap').style.visibility = 'hidden';
    d2wrap.style.visibility = 'hidden';
  } else if (mode === 'pvc') {
    document.getElementById('dpad1-wrap').style.visibility = 'visible';
    d2wrap.style.visibility = 'hidden';
    d2label.textContent = 'CPU';
  } else {
    document.getElementById('dpad1-wrap').style.visibility = 'visible';
    d2wrap.style.visibility = 'visible';
    d2label.textContent = 'P2';
  }

  initGame();
}

function backToMenu() {
  stopGame();
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('game-container').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}

function restartGame() {
  document.getElementById('overlay').classList.remove('visible');
  initGame();
}

// ─────────────────────────────────────────────
// Game init
// ─────────────────────────────────────────────
function makeSnake(sx, sy, dir, id) {
  return {
    id, dir, alive: true, respawnIn: 0, queuedDirs: [],
    body: [
      [sx, sy],
      [sx - DIR[dir][0],   sy - DIR[dir][1]],
      [sx - DIR[dir][0]*2, sy - DIR[dir][1]*2],
    ],
  };
}

function initGame() {
  score1 = 0; score2 = 0;
  gameOver = false; paused = false;
  computeCell();
  updateScoreDisplay();

  snake1 = makeSnake(7,  12, 'RIGHT', 1);
  snake2 = makeSnake(22, 12, 'LEFT',  2);
  foods  = [];
  spawnFood(); spawnFood(); spawnFood();

  stopGame();
  gameLoop = setInterval(tick, tickInterval);
}

function stopGame() {
  if (gameLoop) { clearInterval(gameLoop); gameLoop = null; }
}

// ─────────────────────────────────────────────
// Food
// ─────────────────────────────────────────────
function spawnFood() {
  const occ = new Set(
    [...snake1.body, ...snake2.body, ...foods].map(([x,y]) => `${x},${y}`)
  );
  let x, y, t = 0;
  do {
    x = Math.floor(Math.random() * COLS);
    y = Math.floor(Math.random() * ROWS);
  } while (occ.has(`${x},${y}`) && ++t < 200);
  foods.push([x, y]);
}

// ─────────────────────────────────────────────
// Input helpers
// ─────────────────────────────────────────────
function pushDir(snake, d) {
  const last = snake.queuedDirs.at(-1) ?? snake.dir;
  if (d !== OPPOSITE[last]) snake.queuedDirs.push(d);
  if (snake.queuedDirs.length > 2) snake.queuedDirs.shift();
}

// ─── Keyboard ───
const KEY1 = { KeyW:'UP', KeyS:'DOWN', KeyA:'LEFT', KeyD:'RIGHT' };
const KEY2 = { ArrowUp:'UP', ArrowDown:'DOWN', ArrowLeft:'LEFT', ArrowRight:'RIGHT' };

document.addEventListener('keydown', e => {
  if (e.code === 'Escape') { backToMenu(); return; }
  if (e.code === 'KeyP')   { paused = !paused; return; }
  if (mode === 'cvc' || !snake1) return;

  if (KEY1[e.code] && snake1.alive)                    pushDir(snake1, KEY1[e.code]);
  if (mode === 'pvp' && KEY2[e.code] && snake2?.alive) { e.preventDefault(); pushDir(snake2, KEY2[e.code]); }
});

// ─── Touch swipe on canvas (P1 fallback) ───
let swipeX = 0, swipeY = 0;
canvas.addEventListener('touchstart', e => {
  swipeX = e.touches[0].clientX;
  swipeY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (mode === 'cvc' || !snake1?.alive) return;
  const dx = e.changedTouches[0].clientX - swipeX;
  const dy = e.changedTouches[0].clientY - swipeY;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 18) return;
  pushDir(snake1, Math.abs(dx) > Math.abs(dy)
    ? (dx > 0 ? 'RIGHT' : 'LEFT')
    : (dy > 0 ? 'DOWN'  : 'UP'));
}, { passive: true });

// ─── Mobile D-pad ───
document.getElementById('mobile-pause-btn').addEventListener('touchstart', e => {
  e.preventDefault();
  paused = !paused;
}, { passive: false });

document.querySelectorAll('.dpad-btn').forEach(btn => {
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!snake1 || mode === 'cvc') return;
    const p = +btn.dataset.player, d = btn.dataset.dir;
    if (p === 2 && mode !== 'pvp') return;
    const s = p === 1 ? snake1 : snake2;
    if (s?.alive) pushDir(s, d);
    btn.classList.add('pressed');
  }, { passive: false });

  btn.addEventListener('touchend',   () => btn.classList.remove('pressed'));
  btn.addEventListener('touchcancel',() => btn.classList.remove('pressed'));
});

// ─────────────────────────────────────────────
// AI
// ─────────────────────────────────────────────
function aiMove(snake, target) {
  if (!snake.alive || !target) return;
  const [hx, hy] = snake.body[0];
  const [tx, ty] = target;

  const cands = ['UP','DOWN','LEFT','RIGHT']
    .filter(d => d !== OPPOSITE[snake.dir])
    .sort((a, b) => {
      const da = Math.abs(hx+DIR[a][0]-tx) + Math.abs(hy+DIR[a][1]-ty);
      const db = Math.abs(hx+DIR[b][0]-tx) + Math.abs(hy+DIR[b][1]-ty);
      return da - db;
    });

  const occ   = new Set([...snake1.body, ...snake2.body].map(([x,y]) => `${x},${y}`));
  const tail1 = `${snake1.body.at(-1)[0]},${snake1.body.at(-1)[1]}`;
  const tail2 = `${snake2.body.at(-1)[0]},${snake2.body.at(-1)[1]}`;

  for (const d of cands) {
    const nx = hx+DIR[d][0], ny = hy+DIR[d][1];
    if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
    const k = `${nx},${ny}`;
    if (occ.has(k) && k !== tail1 && k !== tail2) continue;
    snake.queuedDirs.push(d); return;
  }
  for (const d of cands) {
    const nx = hx+DIR[d][0], ny = hy+DIR[d][1];
    if (nx >= 0 && ny >= 0 && nx < COLS && ny < ROWS) { snake.queuedDirs.push(d); return; }
  }
}

function nearestFood(snake) {
  const [hx, hy] = snake.body[0];
  return foods.reduce((b, f) => {
    const d = Math.abs(f[0]-hx)+Math.abs(f[1]-hy);
    return !b || d < Math.abs(b[0]-hx)+Math.abs(b[1]-hy) ? f : b;
  }, null);
}

function nearestFoodExcluding(snake, rival) {
  if (foods.length <= 1) return nearestFood(snake);
  const [hx, hy] = snake.body[0];
  const rivalTarget = nearestFood(rival);
  const others = foods.filter(f => f !== rivalTarget);
  const pool = others.length ? others : foods;
  return pool.reduce((b, f) => {
    const d = Math.abs(f[0]-hx)+Math.abs(f[1]-hy);
    return !b || d < Math.abs(b[0]-hx)+Math.abs(b[1]-hy) ? f : b;
  }, null);
}

// ─────────────────────────────────────────────
// Tick
// ─────────────────────────────────────────────
function tick() {
  if (paused || gameOver) { draw(); return; }

  if (!snake1.alive && --snake1.respawnIn <= 0) respawnSnake(snake1, 7,  12, 'RIGHT');
  if (!snake2.alive && --snake2.respawnIn <= 0) respawnSnake(snake2, 22, 12, 'LEFT');

  if ((mode==='pvc'||mode==='cvc') && snake2.alive) aiMove(snake2, nearestFood(snake2));
  if (mode==='cvc'                 && snake1.alive) aiMove(snake1, nearestFoodExcluding(snake1, snake2));

  moveSnake(snake1);
  moveSnake(snake2);
  checkCollision(snake1, snake2);
  checkCollision(snake2, snake1);
  checkFood(snake1, 1);
  checkFood(snake2, 2);
  while (foods.length < 3) spawnFood();

  updateScoreDisplay();
  draw();
}

function respawnSnake(s, x, y, dir) {
  s.body = [[x,y],[x-DIR[dir][0],y-DIR[dir][1]],[x-DIR[dir][0]*2,y-DIR[dir][1]*2]];
  s.dir = dir; s.queuedDirs = []; s.alive = true;
}

function moveSnake(s) {
  if (!s.alive) return;
  if (s.queuedDirs.length) {
    const nxt = s.queuedDirs.shift();
    if (nxt !== OPPOSITE[s.dir]) s.dir = nxt;
  }
  const [hx, hy] = s.body[0], [dx, dy] = DIR[s.dir];
  s.body.unshift([hx+dx, hy+dy]);
  s.body.pop();
}

function checkCollision(s, other) {
  if (!s.alive) return;
  const [hx, hy] = s.body[0];
  if (hx < 0 || hy < 0 || hx >= COLS || hy >= ROWS) { killSnake(s); return; }
  for (let i = 1; i < s.body.length; i++)
    if (s.body[i][0]===hx && s.body[i][1]===hy) { killSnake(s); return; }
  if (other.alive)
    for (const [x,y] of other.body)
      if (x===hx && y===hy) { killSnake(s); return; }
}

function killSnake(s) {
  s.alive = false;
  s.respawnIn = Math.round(2500 / tickInterval);
  if (s.id===1) score1 = Math.max(0, score1-1);
  else          score2 = Math.max(0, score2-1);
}

function checkFood(s, pNum) {
  if (!s.alive) return;
  const [hx, hy] = s.body[0];
  for (let i = foods.length-1; i >= 0; i--) {
    if (foods[i][0]===hx && foods[i][1]===hy) {
      foods.splice(i, 1);
      s.body.push([...s.body.at(-1)]);
      if (pNum===1) score1++; else score2++;
    }
  }
}

function updateScoreDisplay() {
  document.getElementById('score1').textContent = score1;
  document.getElementById('score2').textContent = score2;
}

// ─────────────────────────────────────────────
// Draw
// ─────────────────────────────────────────────
function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke();
  }

  // Food
  for (const [fx, fy] of foods) {
    const cx = fx*CELL+CELL/2, cy = fy*CELL+CELL/2;
    const g  = ctx.createRadialGradient(cx,cy,2,cx,cy,CELL);
    g.addColorStop(0,'rgba(243,227,208,0.5)');
    g.addColorStop(1,'rgba(210,196,180,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx,cy,CELL,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = COLORS.food;
    ctx.beginPath(); ctx.arc(cx,cy,CELL/2 - Math.max(1,CELL*0.08),0,Math.PI*2); ctx.fill();
  }

  // Snakes
  drawSnake(snake1, COLORS.p1Head, COLORS.p1Body, COLORS.p1Dead);
  drawSnake(snake2, COLORS.p2Head, COLORS.p2Body, COLORS.p2Dead);

  // Pause
  if (paused) {
    ctx.fillStyle = 'rgba(12,24,32,0.78)';
    ctx.fillRect(0,0,W,H);
    const fs = Math.max(16, CELL*1.9|0);
    ctx.fillStyle = '#F3E3D0';
    ctx.font = `bold ${fs}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.font = `${(fs*0.58)|0}px Courier New`;
    ctx.fillStyle = '#81A6C6';
    ctx.fillText(isTouchDevice() ? '⏸ 再按暫停鍵繼續' : '按 P 繼續', W/2, H/2+fs);
    ctx.textAlign = 'left';
  }

  // Respawn
  const lbl1 = mode==='cvc' ? 'CPU1' : 'P1';
  const lbl2 = mode==='pvp' ? 'P2' : (mode==='cvc' ? 'CPU2' : 'CPU');
  if (!snake1.alive) drawRespawn(snake1,'#AACDDC',lbl1);
  if (!snake2.alive) drawRespawn(snake2,'#D2C4B4',lbl2);
}

function drawSnake(s, headCol, bodyCol, deadCol) {
  for (let i = s.body.length-1; i >= 0; i--) {
    const [x,y] = s.body[i], isHead = i===0;
    ctx.fillStyle = isHead
      ? (s.alive ? headCol : deadCol)
      : (s.alive ? shadeColor(bodyCol, 1-(i/s.body.length)*0.4) : deadCol);

    const pad = Math.max(1, CELL * (isHead ? 0.05 : 0.10));
    const r   = Math.max(2, CELL * (isHead ? 0.22 : 0.15));
    roundRect(x*CELL+pad, y*CELL+pad, CELL-pad*2, CELL-pad*2, r);
    ctx.fill();

    // Eyes
    if (isHead && s.alive) {
      ctx.fillStyle = '#0c1820';
      const [dx,dy] = DIR[s.dir];
      const ex = dy!==0 ? CELL*0.28 : (dx>0 ? CELL*0.72 : CELL*0.22);
      const ey = dx!==0 ? CELL*0.28 : (dy>0 ? CELL*0.72 : CELL*0.22);
      const offs = dx!==0 ? [[ex,CELL*0.22],[ex,CELL*0.65]] : [[CELL*0.22,ey],[CELL*0.65,ey]];
      const er = Math.max(1.2, CELL*0.10);
      for (const [ox,oy] of offs) {
        ctx.beginPath(); ctx.arc(x*CELL+ox, y*CELL+oy, er, 0, Math.PI*2); ctx.fill();
      }
    }
  }
}

function drawRespawn(s, color, label) {
  const secs = (s.respawnIn * tickInterval / 1000).toFixed(1);
  ctx.fillStyle = color + '20';
  ctx.fillRect(0,0,W,H);
  const px = s.id===1 ? W*0.25 : W*0.75, py = H/2;
  const fs = Math.max(11, CELL|0);
  ctx.fillStyle = color;
  ctx.font = `bold ${fs}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillText(`${label} 重生中...`, px, py - fs*0.4);
  ctx.font = `${(fs*0.82)|0}px Courier New`;
  ctx.fillStyle = '#aaa';
  ctx.fillText(`${secs}s`, px, py + fs*1.1);
  ctx.textAlign = 'left';
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function shadeColor(hex, ratio) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${r*ratio|0},${g*ratio|0},${b*ratio|0})`;
}

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
setMode('pvp');
</script>
</body>
</html>
