<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- ── 基本 SEO ── -->
  <title>貪食蛇對戰 | Snake Battle – 免費雙人瀏覽器遊戲</title>
  <meta name="description" content="免費雙人貪食蛇對戰遊戲！支援 1P vs 2P、1P vs AI、AI vs AI，可調速度、穿牆模式、食物數量，支援繁中、简中、English、日本語、한국어。">
  <meta name="keywords" content="貪食蛇, snake game, 雙人遊戲, snake battle, 貪食蛇對戰, browser game, 免費遊戲">
  <link rel="canonical" href="https://samhung7.github.io/snake-battle/">

  <!-- ── Open Graph（社群分享預覽：LINE、Facebook 等）── -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="貪食蛇對戰 | Snake Battle">
  <meta property="og:description" content="免費雙人貪食蛇對戰遊戲，支援多語言、多模式，直接在瀏覽器玩！">
  <meta property="og:url" content="https://samhung7.github.io/snake-battle/">
  <meta property="og:image" content="https://samhung7.github.io/snake-battle/preview.png">
  <meta property="og:locale" content="zh_TW">

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="貪食蛇對戰 | Snake Battle">
  <meta name="twitter:description" content="免費雙人貪食蛇對戰遊戲，支援多語言、多模式！">
  <meta name="twitter:image" content="https://samhung7.github.io/snake-battle/preview.png">

  <!-- ── 結構化資料（Schema.org VideoGame）── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "貪食蛇對戰",
    "alternateName": "Snake Battle",
    "description": "雙人貪食蛇對戰遊戲，支援多語言、多模式，免費在瀏覽器遊玩",
    "url": "https://samhung7.github.io/snake-battle/",
    "playMode": ["SinglePlayer", "MultiPlayer"],
    "gamePlatform": "Web Browser",
    "inLanguage": ["zh-TW", "zh-CN", "en", "ja", "ko"],
    "isAccessibleForFree": true,
    "applicationCategory": "Game"
  }
  </script>

  <!-- ── Favicon & PWA ── -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐍</text></svg>">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snake">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1A5472">
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="css/style.css">

  <!-- Google AdSense 驗證 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8095212501968358" crossorigin="anonymous"></script>
</head>
<body class="light">

<!-- ═══════════════════════════════════════
     MENU
════════════════════════════════════════ -->
<div id="menu">

  <div id="menu-topbar">
    <!-- Language selector — left -->
    <select id="lang-select" onchange="setLang(this.value)" title="Language">
      <option value="zh-TW" selected>繁中</option>
      <option value="zh-CN">简中</option>
      <option value="en">EN</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
    </select>

    <h1 data-i18n="title">貪食蛇對戰</h1>

    <!-- Theme toggle — right -->
    <button class="icon-btn" onclick="toggleTheme()" title="切換主題">
      <span class="theme-icon">🌙</span>
    </button>
  </div>

  <div class="mode-buttons">
    <button class="btn btn-1" id="btn-pvp" onclick="setMode('pvp')" data-i18n="btnPvp">1P vs 2P</button>
    <button class="btn btn-2" id="btn-pvc" onclick="setMode('pvc')" data-i18n="btnPvc">1P vs 電腦</button>
    <button class="btn btn-3" id="btn-cvc" onclick="setMode('cvc')" data-i18n="btnCvc">電腦 vs 電腦</button>
  </div>

  <div class="speed-select">
    <label id="speed-label" data-i18n="speedLabel">速度：</label>
    <select id="speed-select">
      <option value="150" data-i18n="speedSlow">慢速</option>
      <option value="100" selected data-i18n="speedNormal">正常</option>
      <option value="65"  data-i18n="speedFast">快速</option>
      <option value="40"  data-i18n="speedCrazy">瘋狂</option>
    </select>
  </div>

  <!-- Wall-wrap mode toggle -->
  <div class="menu-option-row">
    <span class="menu-option-label" data-i18n="wallWrapLabel">穿牆模式</span>
    <button class="btn btn-2 active" id="wall-wrap-btn" onclick="toggleWallWrap()" data-i18n="wallWrapOn">開啟 ✓</button>
  </div>

  <!-- Food count selector -->
  <div class="menu-option-row">
    <span class="menu-option-label" data-i18n="foodLabel">食物數量</span>
    <div class="counter">
      <button class="counter-btn" id="food-minus" onclick="adjustFood(-1)" disabled>−</button>
      <span   class="counter-val" id="food-count-display">3</span>
      <button class="counter-btn" id="food-plus"  onclick="adjustFood(1)">＋</button>
    </div>
  </div>

  <button class="btn btn-1" id="start-btn" onclick="startGame()" data-i18n="startBtn">開始遊戲</button>

  <div class="controls-hint" id="controls-hint"></div>

</div>

<!-- ═══════════════════════════════════════
     GAME
════════════════════════════════════════ -->
<div id="game-container">

  <!-- ── PVP bar top (touch pvp only): scores + action buttons, P1 perspective ── -->
  <div id="pvp-bar-top" class="pvp-bar hidden">
    <div class="pvp-bar-scores">
      <span class="score-p1"><span data-i18n="p1">P1</span>: <span id="pvp-s1a">0</span></span>
      <span class="score-p2"><span data-i18n="p2">P2</span>: <span id="pvp-s2a">0</span></span>
    </div>
    <div class="pvp-bar-btns">
      <button class="icon-btn" onclick="toggleTheme()"><span class="theme-icon">🌙</span></button>
      <button class="icon-btn" id="pvp-pause-btn" onclick="togglePause()">⏸</button>
      <button class="icon-btn pvp-back-btn" onclick="backToMenu()">⌂</button>
    </div>
  </div>

  <!-- Regular top bar: scores + controls (desktop + non-pvp touch) -->
  <div id="game-topbar">
    <div id="scoreboard">
      <span class="score-p1" id="p1-label">P1: <span id="score1">0</span></span>
      <span class="score-p2" id="p2-label">P2: <span id="score2">0</span></span>
    </div>
    <div id="game-actions">
      <button class="icon-btn" onclick="toggleTheme()" title="切換主題">
        <span class="theme-icon">🌙</span>
      </button>
      <button class="icon-btn" id="pause-btn" onclick="togglePause()" title="暫停">⏸</button>
      <button class="icon-btn" id="back-btn"  onclick="backToMenu()"  title="回主選單">⌂</button>
    </div>
  </div>

  <!-- ── Top touchpad: P1 (pvp touch only) ── -->
  <div id="dpad-top" class="dpad-zone hidden">
    <div class="touchpad-wrap">
      <div class="touchpad" id="touchpad1"></div>
    </div>
  </div>

  <!-- ── Canvas ── -->
  <canvas id="canvas"></canvas>
  <div id="status"></div>

  <!-- ── Bottom touchpad: P2 (pvp touch only) ── -->
  <div id="dpad-bottom" class="dpad-zone hidden">
    <div class="touchpad-wrap">
      <div class="touchpad p2" id="touchpad2"></div>
    </div>
  </div>

  <!-- ── PVP bar bottom (touch pvp only): same scores, rotated 180° for P2 perspective ── -->
  <div id="pvp-bar-bottom" class="pvp-bar pvp-bar-flip hidden">
    <div class="pvp-bar-scores">
      <span class="score-p1"><span data-i18n="p1">P1</span>: <span id="pvp-s1b">0</span></span>
      <span class="score-p2"><span data-i18n="p2">P2</span>: <span id="pvp-s2b">0</span></span>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════
     OVERLAY (results / pause)
════════════════════════════════════════ -->
<div id="overlay">
  <h2 id="overlay-title"></h2>
  <p  id="overlay-msg"></p>
  <button class="btn btn-1" id="restart-btn" onclick="restartGame()" data-i18n="restartBtn">再玩一局</button>
  <button class="btn btn-2" id="menu-btn"    onclick="backToMenu()"  data-i18n="menuBtn">主選單</button>
</div>

<!-- Portrait-lock hint overlay — shown via CSS when phone is landscape -->
<div id="rotate-hint">
  <span id="rotate-icon">📱</span>
  <p data-i18n="rotateHint">請旋轉手機為直向</p>
</div>

<script src="js/game.js"></script>
</body>
</html>
